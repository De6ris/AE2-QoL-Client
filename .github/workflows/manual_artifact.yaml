name: Manual artifact

permissions:
  contents: write
  issues: write

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Upload Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.4

      - name: Grant Execute Permission for gradlew
        run: chmod +x ./gradlew

      - name: Setup Java 17
        uses: actions/setup-java@v4.2.1
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build
        run: ./gradlew build

      - name: Find built JAR
        id: find
        run: |
          set -e
          ARTIFACTS=$(ls build/libs/*.jar 2>/dev/null || true)
          if [ -z "$ARTIFACTS" ]; then
            echo "No jar found in build/libs/"
            exit 1
          fi
          # output all matching paths (newline-separated)
          echo "$ARTIFACTS" | tr ' ' '\n' > artifact_paths.txt
          echo "artifact_list<<EOF" >> $GITHUB_OUTPUT
          cat artifact_paths.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: build/libs/*.jar
